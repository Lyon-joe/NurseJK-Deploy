services:
  - type: web
    name: nursejk-assistant
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CHAT_PROVIDER
        value: gemini
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_API_KEY
        sync: false
