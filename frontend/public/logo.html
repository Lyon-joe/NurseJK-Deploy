<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Preview</title>
    <style>
        /* Reset margins and set up a full-screen flex canvas */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Using your signature dark forest green for high contrast background */
            background-color: #1E5631; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Container to add a subtle shadow and structure to your logo */
        .logo-container {
            text-align: center;
            padding: 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Responsive image styling */
        .logo-container img {
            max-width: 300px; /* Adjust this size if you want it bigger or smaller */
            height: auto;
            display: block;
            border-radius: 8px;
        }

        /* Small subtitle underneath the logo */
        .logo-text {
            color: #ACDF87; /* Soft mint green text */
            margin-top: 16px;
            font-size: 14px;
            letter-spacing: 0.05em;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="Application Logo">
        <div class="logo-text">CLINICAL AI ENGINE</div>
    </div>

</body>
</html>
